  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      margin: 0;
      padding: 20px;
      background: var(--page-background, #eef1f7);
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
      transition: background 0.18s ease;
    }

    .plot-shell {
      width: min(1440px, 100%);
      margin: 0 auto;
      overflow: visible;
      border: none;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .plot-shell[data-theme="light"] {
      --page-background: #F7F5EF;
      --toolbar-background: #F7F5EF;
      --toolbar-border: rgba(38, 49, 47, 0.14);
      --toolbar-text: #26312F;
      --button-background: #FFFFFF;
      --button-border: rgba(38, 49, 47, 0.16);
      --button-hover: #EEE9DE;
    }

    .plot-shell[data-theme="dark"] {
      --page-background: #0F1715;
      --toolbar-background: #14211E;
      --toolbar-border: rgba(38, 83, 72, 0.44);
      --toolbar-text: #F7F5EF;
      --button-background: #1A2A26;
      --button-border: rgba(74, 127, 113, 0.42);
      --button-hover: #223530;
    }

    .plot-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: none;
      border-radius: 0;
      background: transparent;
      color: var(--toolbar-text);
      margin-bottom: 12px;
    }

    .plot-toolbar button,
    .plot-toolbar select {
      appearance: none;
      border: 1px solid var(--button-border);
      border-radius: 999px;
      background: var(--button-background);
      color: var(--toolbar-text);
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
      font-size: 12px;
      line-height: 1;
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .plot-toolbar button {
      font-weight: 500;
    }

    .plot-toolbar button.is-active {
      background: var(--button-hover);
      box-shadow: inset 0 0 0 1px var(--button-border);
    }

    .plot-toolbar button:hover,
    .plot-toolbar select:hover {
      background: var(--button-hover);
      transform: translateY(-1px);
    }

    .plot-toolbar label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--toolbar-text);
    }

    .plot-toolbar input[type="range"] {
      width: 108px;
      accent-color: var(--toolbar-text);
      cursor: pointer;
    }

    .plot-toolbar input[type="color"] {
      width: 34px;
      height: 34px;
      padding: 2px;
      border: 1px solid var(--button-border);
      border-radius: 999px;
      background: var(--button-background);
      cursor: pointer;
    }

    .plot-toolbar .toolbar-value {
      min-width: 2.5ch;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .plot-toolbar .toolbar-target {
      font-size: 11px;
      opacity: 0.78;
      white-space: nowrap;
    }

    .plot-container {
      background: transparent;
      padding: 0;
      width: 100%;
      max-width: 100%;
    }

    .plot-container .js-plotly-plot,
    .plot-container .plotly-graph-div,
    .plot-container .svg-container,
    .plot-container .main-svg,
    .plot-container .bg,
    .plot-container rect.bg {
      background: transparent !important;
      fill: transparent !important;
    }
  </style>

  <script>
    (() => {
      const gd = document.getElementById("magic-dorye-plot-8aa97a6a5df749338dc068651cd2ef75");
      const shell = document.getElementById("magic-dorye-plot-8aa97a6a5df749338dc068651cd2ef75-shell");
      const themeButton = document.getElementById("magic-dorye-plot-8aa97a6a5df749338dc068651cd2ef75-theme");
      const gridButton = document.getElementById("magic-dorye-plot-8aa97a6a5df749338dc068651cd2ef75-grid");
      const resetButton = document.getElementById("magic-dorye-plot-8aa97a6a5df749338dc068651cd2ef75-reset");
      const zeroButton = document.getElementById("magic-dorye-plot-8aa97a6a5df749338dc068651cd2ef75-zero");
      const textButton = document.getElementById("magic-dorye-plot-8aa97a6a5df749338dc068651cd2ef75-text");
      const arrowButton = document.getElementById("magic-dorye-plot-8aa97a6a5df749338dc068651cd2ef75-arrow");
      const clearSelectionButton = document.getElementById("magic-dorye-plot-8aa97a6a5df749338dc068651cd2ef75-clear-selection");
      const downloadButton = document.getElementById("magic-dorye-plot-8aa97a6a5df749338dc068651cd2ef75-download");
      const lineWidthSelect = document.getElementById("magic-dorye-plot-8aa97a6a5df749338dc068651cd2ef75-line-width");
      const lineWidthValue = document.getElementById("magic-dorye-plot-8aa97a6a5df749338dc068651cd2ef75-line-width-value");
      const lineStyleSelect = document.getElementById("magic-dorye-plot-8aa97a6a5df749338dc068651cd2ef75-line-style");
      const lineColorInput = document.getElementById("magic-dorye-plot-8aa97a6a5df749338dc068651cd2ef75-line-color");
      const xScaleSelect = document.getElementById("magic-dorye-plot-8aa97a6a5df749338dc068651cd2ef75-x-scale");
      const targetLabel = document.getElementById("magic-dorye-plot-8aa97a6a5df749338dc068651cd2ef75-target");
      const plotContainer = shell.querySelector(".plot-container");

      const themes = {"light": {"name": "light", "plot_bgcolor": "#FFFFFF", "paper_bgcolor": "#FFFFFF", "page_background": "#F7F5EF", "font_color": "#26312F", "axis_color": "#26312F", "grid_color": "rgba(38, 49, 47, 0.12)", "legend_bgcolor": "rgba(255, 255, 255, 0.92)", "legend_bordercolor": "rgba(38, 49, 47, 0.16)", "toolbar_background": "#F7F5EF", "toolbar_border": "rgba(38, 49, 47, 0.14)", "toolbar_text": "#26312F", "button_background": "#FFFFFF", "button_border": "rgba(38, 49, 47, 0.16)", "button_hover": "#EEE9DE", "zero_line_color": "rgba(38, 49, 47, 0.42)"}, "dark": {"name": "dark", "plot_bgcolor": "#1A2A26", "paper_bgcolor": "#1A2A26", "page_background": "#0F1715", "font_color": "#F7F5EF", "axis_color": "#F7F5EF", "grid_color": "rgba(247, 245, 239, 0.14)", "legend_bgcolor": "rgba(26, 42, 38, 0.92)", "legend_bordercolor": "rgba(247, 245, 239, 0.14)", "toolbar_background": "#14211E", "toolbar_border": "rgba(38, 83, 72, 0.44)", "toolbar_text": "#F7F5EF", "button_background": "#1A2A26", "button_border": "rgba(74, 127, 113, 0.42)", "button_hover": "#223530", "zero_line_color": "rgba(247, 245, 239, 0.38)"}};
      const axisKeys = Object.keys(gd.layout).filter(
        (key) => /^(xaxis|yaxis)\d*$/.test(key)
      );
      const baseShapes = [];
      const zeroShapes = {"light": [{"type": "line", "xref": "x domain", "yref": "y", "x0": 0, "x1": 1, "y0": 0, "y1": 0, "line": {"color": "rgba(38, 49, 47, 0.42)", "width": 1, "dash": "dot"}, "layer": "above"}], "dark": [{"type": "line", "xref": "x domain", "yref": "y", "x0": 0, "x1": 1, "y0": 0, "y1": 0, "line": {"color": "rgba(247, 245, 239, 0.38)", "width": 1, "dash": "dot"}, "layer": "above"}]};
      const lineTraceIndices = [0];
      const customLineColorIndices = new Set();
      const state = {
        theme: "light",
        showGrid: true,
        showZeroLine: false,
        interactionMode: null,
        arrowStart: null,
        selectedTraceIndex: null,
        xScale: 1.0,
      };

      function updateToolbarLabels() {
        themeButton.textContent = state.theme === "light" ? "Dark Mode" : "Light Mode";
        gridButton.textContent = state.showGrid ? "Hide Grid" : "Show Grid";
        zeroButton.textContent = state.showZeroLine ? "Remove Zero Line" : "Add Zero Line";
        textButton.textContent = state.interactionMode === "text" ? "Cancel Text" : "Add Text";
        arrowButton.textContent =
          state.interactionMode === "arrow" && state.arrowStart
            ? "Pick Arrow End"
            : state.interactionMode === "arrow"
              ? "Cancel Arrow"
              : "Add Arrow";
        textButton.classList.toggle("is-active", state.interactionMode === "text");
        arrowButton.classList.toggle("is-active", state.interactionMode === "arrow");
        clearSelectionButton.classList.toggle("is-active", state.selectedTraceIndex === null);
        if (state.selectedTraceIndex === null) {
          targetLabel.textContent = "Target: all traces";
        } else {
          const trace = gd.data[state.selectedTraceIndex];
          const traceName = trace && trace.name ? trace.name : `trace ${state.selectedTraceIndex + 1}`;
          targetLabel.textContent = `Target: ${traceName}`;
        }
        updateLineColorInput();
      }

      function rgbChannelsToHex(channels) {
        return `#${channels
          .map((value) => Math.max(0, Math.min(255, Math.round(value))))
          .map((value) => value.toString(16).padStart(2, "0"))
          .join("")}`;
      }

      function colorToHex(color) {
        const rgb = parseColor(color);
        if (rgb) {
          return rgbChannelsToHex(rgb);
        }

        if (typeof document === "undefined" || !document.body) {
          return null;
        }

        const probe = document.createElement("span");
        probe.style.color = color;
        probe.style.display = "none";
        document.body.appendChild(probe);
        const computed = window.getComputedStyle(probe).color;
        document.body.removeChild(probe);
        const computedRgb = parseColor(computed);
        return computedRgb ? rgbChannelsToHex(computedRgb) : null;
      }

      function defaultToolbarLineColor() {
        return state.theme === "light" ? "#000000" : "#ffffff";
      }

      function currentTargetLineColor() {
        const targetIndex =
          state.selectedTraceIndex === null ? lineTraceIndices[0] : state.selectedTraceIndex;
        if (typeof targetIndex !== "number") {
          return defaultToolbarLineColor();
        }

        const trace = gd.data[targetIndex];
        if (!trace || !trace.line || !trace.line.color) {
          return defaultToolbarLineColor();
        }

        return colorToHex(trace.line.color) || defaultToolbarLineColor();
      }

      function updateLineColorInput() {
        if (!lineColorInput) {
          return;
        }
        lineColorInput.value = currentTargetLineColor();
      }

      function parseColor(color) {
        if (typeof color !== "string") {
          return null;
        }

        const normalized = color.trim().toLowerCase();
        if (normalized === "white") {
          return [255, 255, 255];
        }
        if (normalized === "black") {
          return [0, 0, 0];
        }
        if (normalized.startsWith("#")) {
          const hex = normalized.slice(1);
          if (hex.length === 3) {
            return hex.split("").map((value) => parseInt(value + value, 16));
          }
          if (hex.length === 6) {
            return [
              parseInt(hex.slice(0, 2), 16),
              parseInt(hex.slice(2, 4), 16),
              parseInt(hex.slice(4, 6), 16),
            ];
          }
        }

        const match = normalized.match(/rgba?\(([^)]+)\)/);
        if (!match) {
          return null;
        }

        const channels = match[1]
          .split(",")
          .slice(0, 3)
          .map((value) => Number.parseFloat(value.trim()));

        if (channels.some((value) => Number.isNaN(value))) {
          return null;
        }

        return channels;
      }

      function isThemeSwappableMonochrome(color) {
        const rgb = parseColor(color);
        if (!rgb) {
          return false;
        }

        const average = (rgb[0] + rgb[1] + rgb[2]) / 3;
        return average <= 25 || average >= 240;
      }

      function applyTraceTheme() {
        const lineColor = state.theme === "light" ? "#000000" : "#ffffff";
        const traceUpdates = [];

        gd.data.forEach((trace, index) => {
          if (customLineColorIndices.has(index)) {
            return;
          }
          const updates = {};

          if (trace.line && isThemeSwappableMonochrome(trace.line.color)) {
            updates["line.color"] = lineColor;
          }

          if (
            trace.marker &&
            trace.marker.line &&
            isThemeSwappableMonochrome(trace.marker.line.color)
          ) {
            updates["marker.line.color"] = lineColor;
          }

          if (Object.keys(updates).length > 0) {
            traceUpdates.push([updates, [index]]);
          }
        });

        for (const [updates, indices] of traceUpdates) {
          Plotly.restyle(gd, updates, indices);
        }
      }

      function themeAnnotations(annotations) {
        const lineColor = state.theme === "light" ? "#000000" : "#ffffff";
        return (annotations || []).map((annotation) => {
          const updated = Object.assign({}, annotation);
          updated.font = Object.assign({}, updated.font || {}, {
            family: "\"Palatino Linotype\", \"Book Antiqua\", Palatino, serif",
            color: lineColor,
          });
          if (updated.showarrow) {
            updated.arrowcolor = lineColor;
          }
          return updated;
        });
      }

      function setAnnotations(annotations) {
        Plotly.relayout(gd, {
          annotations: themeAnnotations(annotations),
        });
      }

      function cancelInteraction() {
        state.interactionMode = null;
        state.arrowStart = null;
        gd.style.cursor = "";
        updateToolbarLabels();
      }

      function setInteractionMode(mode) {
        if (state.interactionMode === mode) {
          cancelInteraction();
          return;
        }
        state.interactionMode = mode;
        state.arrowStart = null;
        gd.style.cursor = "crosshair";
        updateToolbarLabels();
      }

      function axisReference(point, axisName) {
        const axis = point[axisName];
        if (!axis || !axis._id) {
          return axisName === "xaxis" ? "x" : "y";
        }
        return axis._id;
      }

      function targetTraceIndices() {
        return state.selectedTraceIndex === null
          ? lineTraceIndices
          : [state.selectedTraceIndex];
      }

      function selectTrace(index) {
        if (!lineTraceIndices.includes(index)) {
          state.selectedTraceIndex = null;
          updateToolbarLabels();
          return;
        }
        state.selectedTraceIndex = index;
        updateToolbarLabels();
      }

      function addTextAnnotation(point) {
        const text = window.prompt("Annotation text:", "");
        if (!text) {
          cancelInteraction();
          return;
        }

        const annotations = (gd.layout.annotations || []).slice();
        annotations.push({
          x: point.x,
          y: point.y,
          xref: axisReference(point, "xaxis"),
          yref: axisReference(point, "yaxis"),
          text: text,
          showarrow: false,
          bgcolor: state.theme === "light"
            ? "rgba(255,255,255,0.88)"
            : "rgba(13,20,32,0.88)",
          bordercolor: state.theme === "light"
            ? "rgba(17,24,39,0.18)"
            : "rgba(245,247,251,0.18)",
          borderwidth: 1,
          borderpad: 4,
        });
        setAnnotations(annotations);
        cancelInteraction();
      }

      function addArrowAnnotation(point) {
        if (!state.arrowStart) {
          state.arrowStart = {
            x: point.x,
            y: point.y,
            xref: axisReference(point, "xaxis"),
            yref: axisReference(point, "yaxis"),
          };
          updateToolbarLabels();
          return;
        }

        const label = window.prompt("Arrow label (optional):", "") || "";
        const annotations = (gd.layout.annotations || []).slice();
        annotations.push({
          x: point.x,
          y: point.y,
          xref: axisReference(point, "xaxis"),
          yref: axisReference(point, "yaxis"),
          ax: state.arrowStart.x,
          ay: state.arrowStart.y,
          axref: state.arrowStart.xref,
          ayref: state.arrowStart.yref,
          text: label,
          showarrow: true,
          arrowhead: 3,
          arrowsize: 1,
          arrowwidth: 2,
        });
        setAnnotations(annotations);
        cancelInteraction();
      }

      function buildThemeRelayout() {
        const theme = themes[state.theme];
        const currentAnnotations = themeAnnotations(gd.layout.annotations || []);
        const updates = {
          paper_bgcolor: theme.paper_bgcolor,
          plot_bgcolor: theme.plot_bgcolor,
          "font.color": theme.font_color,
          "title.font.color": theme.font_color,
          "legend.bgcolor": theme.legend_bgcolor,
          "legend.bordercolor": theme.legend_bordercolor,
          "legend.font.color": theme.font_color,
          annotations: currentAnnotations,
          shapes: state.showZeroLine
            ? baseShapes.concat(zeroShapes[state.theme])
            : baseShapes,
        };

        for (const axisKey of axisKeys) {
          updates[`${axisKey}.showgrid`] = state.showGrid;
          updates[`${axisKey}.gridcolor`] = state.showGrid
            ? theme.grid_color
            : "rgba(0,0,0,0)";
          updates[`${axisKey}.linecolor`] = theme.axis_color;
          updates[`${axisKey}.tickcolor`] = theme.axis_color;
          updates[`${axisKey}.zerolinecolor`] = theme.axis_color;
          updates[`${axisKey}.tickfont.color`] = theme.font_color;
          updates[`${axisKey}.title.font.color`] = theme.font_color;
        }

        return updates;
      }

      function applyState() {
        shell.dataset.theme = state.theme;
        document.body.dataset.theme = state.theme;
        document.body.style.setProperty(
          "--page-background",
          themes[state.theme].page_background
        );
        updateToolbarLabels();
        Plotly.relayout(gd, buildThemeRelayout());
        applyTraceTheme();
      }

      function resetView() {
        const updates = {};
        for (const axisKey of axisKeys) {
          updates[`${axisKey}.autorange`] = true;
        }
        Plotly.relayout(gd, updates);
      }

      function updateHorizontalScale(scale) {
        if (!xScaleSelect) {
          return;
        }

        const numericScale = Math.min(Math.max(Number(scale), 0.2), 1.0);
        if (!Number.isFinite(numericScale)) {
          return;
        }

        state.xScale = numericScale;
        if (plotContainer) {
          plotContainer.style.width = `${numericScale * 100}%`;
          plotContainer.style.maxWidth = "100%";
        }
        gd.style.width = "100%";
        if (
          window.Plotly &&
          window.Plotly.Plots &&
          typeof window.Plotly.Plots.resize === "function"
        ) {
          window.Plotly.Plots.resize(gd);
        }
      }

      function updateLineWidth(width) {
        const targetIndices = targetTraceIndices();
        if (targetIndices.length === 0) {
          return;
        }
        lineWidthValue.textContent = width;
        Plotly.restyle(gd, {"line.width": Number(width)}, targetIndices);
      }

      function updateLineStyle(style) {
        const targetIndices = targetTraceIndices();
        if (targetIndices.length === 0) {
          return;
        }
        Plotly.restyle(gd, {"line.dash": style}, targetIndices);
      }

      function updateLineColor(color) {
        const targetIndices = targetTraceIndices();
        if (targetIndices.length === 0) {
          return;
        }
        targetIndices.forEach((index) => customLineColorIndices.add(index));
        Plotly.restyle(gd, {"line.color": color}, targetIndices);
        updateLineColorInput();
      }

      themeButton.addEventListener("click", () => {
        state.theme = state.theme === "light" ? "dark" : "light";
        applyState();
      });

      gridButton.addEventListener("click", () => {
        state.showGrid = !state.showGrid;
        applyState();
      });

      zeroButton.addEventListener("click", () => {
        state.showZeroLine = !state.showZeroLine;
        applyState();
      });

      textButton.addEventListener("click", () => {
        setInteractionMode("text");
      });

      arrowButton.addEventListener("click", () => {
        setInteractionMode("arrow");
      });

      clearSelectionButton.addEventListener("click", () => {
        state.selectedTraceIndex = null;
        updateToolbarLabels();
      });

      resetButton.addEventListener("click", resetView);
      lineWidthSelect.addEventListener("input", (event) => {
        updateLineWidth(event.target.value);
      });
      lineStyleSelect.addEventListener("change", (event) => {
        updateLineStyle(event.target.value);
      });
      lineColorInput.addEventListener("input", (event) => {
        updateLineColor(event.target.value);
      });
      if (xScaleSelect) {
        xScaleSelect.addEventListener("change", (event) => {
          updateHorizontalScale(event.target.value);
        });
      }

      downloadButton.addEventListener("click", () => {
        Plotly.downloadImage(gd, {
          format: "png",
          filename: "lc_x",
          scale: 2,
        });
      });

      gd.on("plotly_click", (eventData) => {
        if (!state.interactionMode || !eventData || !eventData.points || !eventData.points.length) {
          if (eventData && eventData.points && eventData.points.length) {
            selectTrace(eventData.points[0].curveNumber);
          }
          return;
        }

        const point = eventData.points[0];
        selectTrace(point.curveNumber);
        if (state.interactionMode === "text") {
          addTextAnnotation(point);
          return;
        }

        if (state.interactionMode === "arrow") {
          addArrowAnnotation(point);
        }
      });

      gd.on("plotly_legendclick", (eventData) => {
        if (eventData && typeof eventData.curveNumber === "number") {
          selectTrace(eventData.curveNumber);
        }
        return true;
      });

      document.body.dataset.theme = state.theme;
      updateToolbarLabels();
      updateLineWidth(lineWidthSelect.value);
      updateLineStyle(lineStyleSelect.value);
      updateLineColorInput();
      if (xScaleSelect) {
        updateHorizontalScale(xScaleSelect.value);
      }
      applyState();
    })();
  </script>
<script>
/* Apeiron demo: sync plot theme with parent app via ?theme= or postMessage */
(function () {
  function btn() { return document.querySelector('[id$="-theme"]'); }
  function current() { var b = btn(); return b && /Light Mode/.test(b.textContent) ? 'dark' : 'light'; }
  function setTheme(t) { var b = btn(); if (b && current() !== t) b.click(); }
  function fromUrl() { try { var p = new URLSearchParams(location.search).get('theme'); if (p === 'dark' || p === 'light') setTheme(p); } catch (e) {} }
  window.addEventListener('message', function (e) {
    var d = e.data;
    if (d && d.type === 'apeiron-theme' && (d.theme === 'dark' || d.theme === 'light')) setTheme(d.theme);
  });
  if (document.readyState === 'complete') setTimeout(fromUrl, 60);
  else window.addEventListener('load', function () { setTimeout(fromUrl, 60); });
})();
</script>

<script>
/* Apeiron demo: report content height to parent so the iframe fits its bubble */
(function () {
  function h() {
    var b = document.body, e = document.documentElement;
    return Math.max(b.scrollHeight, b.offsetHeight, e.scrollHeight, e.offsetHeight);
  }
  function post() { try { parent.postMessage({ type: 'apeiron-height', h: h() }, '*'); } catch (e) {} }
  window.addEventListener('load', function () { [120, 400, 900, 1600, 2600, 4200, 6500].forEach(function (t) { setTimeout(post, t); }); });
  window.addEventListener('resize', post);
  try { new ResizeObserver(post).observe(document.body); } catch (e) {}
})();
</script>
